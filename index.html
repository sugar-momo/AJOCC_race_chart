<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJOCCシクロクロス ラップタイム分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #eef0f4;
    --border: rgba(0,0,0,0.1);
    --text: #1a1d26;
    --muted: #6b7280;
    --accent: #0077cc;
    --accent2: #005fa3;
    --green: #16a34a;
    --amber: #b45309;
    --font: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .logo {
    font-family: var(--mono); font-size: 0.7rem; color: var(--accent);
    letter-spacing: 0.15em; border: 1.5px solid var(--accent);
    padding: 3px 8px; border-radius: 3px; flex-shrink: 0;
    font-weight: 600;
  }
  .header-race-name { font-size: 0.95rem; font-weight: 500; color: var(--text); }
  .header-cat {
    font-family: var(--mono); font-size: 0.72rem; color: var(--accent);
    background: rgba(0,119,204,0.1); padding: 2px 10px; border-radius: 3px;
    margin-left: auto; flex-shrink: 0; font-weight: 600;
  }

  /* Layout */
  .layout { display: flex; height: calc(100vh - 55px); overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 300px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .sidebar-head input[type=search] {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 7px 10px; font-size: 0.83rem; font-family: var(--font);
    outline: none;
  }
  .sidebar-head input[type=search]:focus { border-color: rgba(79,195,247,0.5); }
  .season-filter {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .season-btn {
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 0.75rem; font-family: var(--font); cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .season-btn.active { background: rgba(79,195,247,0.12); color: var(--accent); border-color: rgba(79,195,247,0.3); }
  .race-count { font-size: 0.72rem; color: var(--muted); }

  .race-list { overflow-y: auto; flex: 1; }

  /* ツリー: 大会グループ */
  .meet-group { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .meet-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .meet-header:hover { background: rgba(255,255,255,0.03); }
  .meet-header.has-active { background: rgba(79,195,247,0.04); }
  .meet-arrow {
    font-size: 0.6rem; color: var(--muted);
    transition: transform 0.18s;
    flex-shrink: 0; width: 10px;
  }
  .meet-group.open .meet-arrow { transform: rotate(90deg); }
  .meet-info { flex: 1; min-width: 0; }
  .meet-name {
    font-size: 0.82rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
  }
  .meet-meta { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
  .meet-count {
    font-family: var(--mono); font-size: 0.68rem;
    background: rgba(255,255,255,0.06); color: var(--muted);
    padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
  }

  /* ツリー: カテゴリ一覧 */
  .cat-list {
    display: none;
    background: rgba(0,0,0,0.15);
  }
  .meet-group.open .cat-list { display: block; }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px 7px 28px;
    cursor: pointer;
    border-top: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
  }
  .cat-item:hover { background: rgba(255,255,255,0.03); }
  .cat-item.active {
    background: rgba(79,195,247,0.08);
    border-left: 2px solid var(--accent);
    padding-left: 26px;
  }
  .cat-name {
    font-family: var(--mono); font-size: 0.75rem; color: var(--accent);
    background: rgba(79,195,247,0.08);
    padding: 2px 8px; border-radius: 3px;
  }
  .cat-item.active .cat-name { background: rgba(79,195,247,0.18); }

  /* Loading / empty states */
  .state-msg {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 12px; color: var(--muted); font-size: 0.9rem; text-align: center;
    padding: 2rem;
  }
  .state-msg .icon { font-size: 2rem; opacity: 0.4; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Main panel */
  .main-panel { flex: 1; overflow-y: auto; padding: 1.5rem 2rem 3rem; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .tab {
    padding: 6px 16px; font-size: 0.82rem; font-family: var(--font);
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .tab.active { background: rgba(79,195,247,0.12); color: var(--accent); }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .stat-value { font-size: 1.25rem; font-family: var(--mono); }
  .stat-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* Chart */
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .chart-wrap canvas { max-height: 340px; }

  /* Rider chips */
  .riders-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .rider-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.25rem; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px 4px 8px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 0.8rem; color: var(--muted);
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .chip.active { color: var(--text); background: var(--surface2); }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .chip .rank-badge { font-family: var(--mono); font-size: 0.66rem; background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 3px; }

  /* Table */
  .result-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .result-table th {
    text-align: left; padding: 7px 10px;
    color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); font-weight: 400;
  }
  .result-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: var(--mono); }
  .result-table tr:last-child td { border-bottom: none; }
  .rider-name { font-family: var(--font) !important; }
  .pos-1 { color: var(--amber); } .pos-2 { color: #bdbdbd; } .pos-3 { color: #a97c50; }
  .best-lap { color: var(--green); }
  .dns-row { opacity: 0.4; font-style: italic; }
  .color-swatch { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Updated at */
  .updated-at { font-size: 0.7rem; color: var(--muted); text-align: right; margin-bottom: 0.5rem; }

  /* Responsive */
  @media (max-width: 700px) {
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: 260px; border-right: none; border-bottom: 1px solid var(--border); }
    .main-panel { padding: 1rem; }
    header { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">AJOCC</span>
  <span class="header-race-name" id="header-title">シクロクロス ラップタイム分析</span>
  <span class="header-cat" id="header-cat"></span>
</header>

<div class="layout">
  <!-- Sidebar: race selector -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <input type="search" id="race-search" placeholder="レース名・大会名で検索…">
      <div class="season-filter" id="season-filter"></div>
      <div class="race-count" id="race-count"></div>
    </div>
    <div class="race-list" id="race-list">
      <div class="state-msg"><div class="spinner"></div><span>データ読み込み中…</span></div>
    </div>
  </aside>

  <!-- Main: chart + table -->
  <main class="main-panel" id="main-panel">
    <div class="state-msg" id="empty-state">
      <div class="icon">📊</div>
      <span>左のリストからレースを選択してください</span>
    </div>
    <div id="race-view" style="display:none">
      <div class="updated-at" id="updated-at"></div>
      <div class="controls">
        <div class="tab-group">
          <button class="tab active" data-tab="laptime">ラップタイム</button>
          <button class="tab" data-tab="cumulative">累積タイム</button>
        </div>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <p class="riders-label">選手フィルター</p>
      <div class="rider-chips" id="rider-chips"></div>
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
      <div class="chart-wrap" style="padding:0.5rem 0; overflow-x:auto;">
        <table class="result-table" id="result-table"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </main>
</div>

<script>
const COLORS = [
  '#4fc3f7','#69f0ae','#ffd740','#ff5252','#ce93d8',
  '#80cbc4','#ffab40','#f48fb1','#a5d6a7','#90caf9',
  '#fff176','#ef9a9a','#80deea','#b39ddb','#ffcc02'
];

let allRaces = [];
let filteredRaces = [];
let currentRace = null;
let chartInstance = null;
let visibleRiders = new Set();
let currentTab = 'laptime';
let currentSeason = 'all';

// ---- Time helpers ----
function parseTimeSec(s) {
  if (!s) return null;
  const parts = s.split(':');
  if (parts.length === 2) {
    const m = parseFloat(parts[0]), sec = parseFloat(parts[1]);
    return isNaN(m)||isNaN(sec) ? null : m*60+sec;
  } else if (parts.length === 3) {
    const h = parseFloat(parts[0]), m = parseFloat(parts[1]), sec = parseFloat(parts[2]);
    return isNaN(h)||isNaN(m)||isNaN(sec) ? null : h*3600+m*60+sec;
  }
  return null;
}
function formatSec(sec) {
  if (sec===null||isNaN(sec)) return '—';
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=(sec%60).toFixed(1);
  if (h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(4,'0')}`;
  return `${m}:${String(s).padStart(4,'0')}`;
}

// races.json のラップタイムは累積タイム文字列なので差分でラップタイムを計算
function processRider(rider) {
  const cumSecs = rider.lapTimes.map(parseTimeSec);
  const lapSecs = cumSecs.map((v,i) => {
    if (v===null) return null;
    return i===0 ? v : (cumSecs[i-1]===null ? null : v - cumSecs[i-1]);
  });
  return { ...rider, cumSecs, lapSecs };
}

// ---- Load races.json ----
async function loadRaces() {
  try {
    const res = await fetch('races.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    allRaces = (json.races || []).map(r => ({
      ...r,
      riders: (r.riders || []).map(processRider)
    }));

    // updatedAt
    if (json.updatedAt) {
      const d = new Date(json.updatedAt);
      document.getElementById('updated-at').textContent =
        `最終更新: ${d.toLocaleDateString('ja-JP')} ${d.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'})} UTC`;
    }

    buildSeasonFilter();
    renderRaceList();
  } catch(e) {
    document.getElementById('race-list').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><span>races.json の読み込みに失敗しました<br><small style="color:rgba(136,144,168,0.6)">${e.message}</small></span></div>`;
  }
}

// ---- Season filter ----
function buildSeasonFilter() {
  const seasons = new Set();
  allRaces.forEach(r => {
    if (r.date) {
      const y = r.date.slice(0,4);
      const m = parseInt(r.date.slice(5,7));
      // シクロクロスシーズンは10月〜翌3月なので年をまたぐ
      const sy = m >= 10 ? parseInt(y) : parseInt(y)-1;
      seasons.add(`${sy}-${sy+1}`);
    }
  });
  const sorted = [...seasons].sort().reverse();
  const el = document.getElementById('season-filter');
  el.innerHTML = `<button class="season-btn active" data-season="all">すべて</button>` +
    sorted.map(s => `<button class="season-btn" data-season="${s}">${s}</button>`).join('');
  el.querySelectorAll('.season-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSeason = btn.dataset.season;
      renderRaceList();
    });
  });
}

function raceSeasonKey(r) {
  if (!r.date) return '';
  const y = parseInt(r.date.slice(0,4));
  const m = parseInt(r.date.slice(5,7));
  const sy = m >= 10 ? y : y-1;
  return `${sy}-${sy+1}`;
}

// ---- Race list (tree) ----
// 開閉状態を保持
const openMeets = new Set();

function renderRaceList() {
  const query = document.getElementById('race-search').value.toLowerCase();
  filteredRaces = allRaces.filter(r => {
    if (currentSeason !== 'all' && raceSeasonKey(r) !== currentSeason) return false;
    if (query) {
      const haystack = `${r.raceName} ${r.meetName} ${r.category}`.toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  document.getElementById('race-count').textContent = `${filteredRaces.length} レース`;

  const el = document.getElementById('race-list');
  if (filteredRaces.length === 0) {
    el.innerHTML = '<div class="state-msg"><span>該当なし</span></div>';
    return;
  }

  // 大会でグループ化（meetName + date でキー）
  const groups = [];
  const groupMap = new Map();
  for (const r of filteredRaces) {
    const key = `${r.date||''}__${r.meetName||r.raceName||''}`;
    if (!groupMap.has(key)) {
      const g = { key, date: r.date, name: r.meetName || r.raceName || '名称不明', races: [] };
      groups.push(g);
      groupMap.set(key, g);
    }
    groupMap.get(key).races.push(r);
  }

  // 検索中は全グループ展開
  if (query) groups.forEach(g => openMeets.add(g.key));
  // 現在選択中のレースが属するグループを展開
  if (currentRace) {
    const activeKey = `${currentRace.date||''}__${currentRace.meetName||currentRace.raceName||''}`;
    openMeets.add(activeKey);
  }
  // デフォルト: 最初のグループを開く
  if (openMeets.size === 0 && groups.length > 0) openMeets.add(groups[0].key);

  el.innerHTML = '';
  for (const g of groups) {
    const isOpen = openMeets.has(g.key);
    const hasActive = currentRace && g.races.some(r => r.id === currentRace.id);

    const groupEl = document.createElement('div');
    groupEl.className = `meet-group${isOpen ? ' open' : ''}`;

    groupEl.innerHTML = `
      <div class="meet-header${hasActive ? ' has-active' : ''}">
        <span class="meet-arrow">▶</span>
        <div class="meet-info">
          <div class="meet-name">${g.name}</div>
          <div class="meet-meta">${g.date || ''}</div>
        </div>
        <span class="meet-count">${g.races.length}</span>
      </div>
      <div class="cat-list">
        ${g.races.map(r => `
          <div class="cat-item${currentRace && currentRace.id===r.id ? ' active' : ''}" data-id="${r.id}">
            <span class="cat-name">${r.category || '—'}</span>
          </div>
        `).join('')}
      </div>
    `;

    // 大会ヘッダークリックで開閉
    groupEl.querySelector('.meet-header').addEventListener('click', () => {
      if (openMeets.has(g.key)) openMeets.delete(g.key);
      else openMeets.add(g.key);
      groupEl.classList.toggle('open');
    });

    // カテゴリクリックでレース選択
    groupEl.querySelectorAll('.cat-item').forEach(item => {
      item.addEventListener('click', () => {
        const race = allRaces.find(r => r.id === item.dataset.id);
        if (race) selectRace(race);
      });
    });

    el.appendChild(groupEl);
  }
}

// ---- Select race ----
function selectRace(race) {
  currentRace = race;
  const finishers = race.riders.filter(r => !isNaN(parseInt(r.pos)));
  visibleRiders = new Set(finishers.map(r => r.name));

  document.getElementById('header-title').textContent = race.meetName || race.raceName || '';
  document.getElementById('header-cat').textContent = race.category || '';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('race-view').style.display = 'block';

  renderStats(race);
  renderChips(race);
  renderChart();
  renderTable(race);
  renderRaceList(); // アクティブ状態更新
}

// ---- Stats ----
function renderStats(race) {
  const finishers = race.riders.filter(r => !isNaN(parseInt(r.pos)));
  const allLaps = finishers.flatMap(r => r.lapSecs.filter(v => v !== null));
  const bestLap = allLaps.length ? Math.min(...allLaps) : null;
  const bestLapRider = bestLap !== null ? finishers.find(r => r.lapSecs.includes(bestLap)) : null;
  const winner = finishers.find(r => r.pos === '1');
  const totalSec = winner ? winner.cumSecs.filter(v=>v!==null).at(-1) : null;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">出走者</div>
      <div class="stat-value">${race.riders.length}</div>
      <div class="stat-sub">完走 ${finishers.length}名</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">周回数</div>
      <div class="stat-value">${(race.lapLabels||[]).length || (race.riders[0]?.lapTimes?.length||'—')}</div>
      <div class="stat-sub">周</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">優勝タイム</div>
      <div class="stat-value">${formatSec(totalSec)}</div>
      <div class="stat-sub">${winner ? winner.name : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最速ラップ</div>
      <div class="stat-value" style="color:var(--green)">${formatSec(bestLap)}</div>
      <div class="stat-sub">${bestLapRider ? bestLapRider.name : ''}</div>
    </div>
  `;
}

// ---- Chips ----
function renderChips(race) {
  const finishers = race.riders.filter(r => !isNaN(parseInt(r.pos)));
  const el = document.getElementById('rider-chips');
  el.innerHTML = '';
  finishers.forEach((r,i) => {
    const color = COLORS[i%COLORS.length];
    const chip = document.createElement('div');
    chip.className = 'chip active';
    chip.innerHTML = `<span class="dot" style="background:${color}"></span>${r.name}<span class="rank-badge">${r.pos}</span>`;
    chip.addEventListener('click', () => {
      if (visibleRiders.has(r.name)) { visibleRiders.delete(r.name); chip.classList.remove('active'); }
      else { visibleRiders.add(r.name); chip.classList.add('active'); }
      renderChart();
    });
    el.appendChild(chip);
  });
}

// ---- Chart ----
function renderChart() {
  const race = currentRace;
  const finishers = race.riders.filter(r => !isNaN(parseInt(r.pos)));
  const visible = finishers.filter(r => visibleRiders.has(r.name));
  const isLap = currentTab === 'laptime';
  const lapCount = (race.lapLabels||[]).length || (race.riders[0]?.lapTimes?.length||0);
  const labels = Array.from({length: lapCount}, (_,i) => `${i+1}周`);

  const datasets = visible.map((r,i) => {
    const idx = finishers.indexOf(r);
    const color = COLORS[idx%COLORS.length];
    const vals = isLap ? r.lapSecs : r.cumSecs;
    return {
      label: r.name, data: vals,
      borderColor: color, backgroundColor: color+'22',
      borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      tension: 0.25, fill: false,
      spanGaps: false,
    };
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('main-chart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, animation: {duration: 250},
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {display:false},
        tooltip: {
          backgroundColor:'#1e2230', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'#8890a8', bodyColor:'#e8eaf2',
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${formatSec(ctx.parsed.y)}` }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#8890a8',font:{size:11}} },
        y: {
          grid:{color:'rgba(255,255,255,0.05)'},
          ticks:{color:'#8890a8',font:{size:11}, callback: v=>formatSec(v)},
          title:{display:true, text: isLap?'ラップタイム':'累積タイム', color:'#8890a8', font:{size:11}},
          ...(isLap ? {reverse:true} : {})
        }
      }
    }
  });
}

// ---- Table ----
function renderTable(race) {
  const finishers = race.riders.filter(r => !isNaN(parseInt(r.pos)));
  const dns = race.riders.filter(r => isNaN(parseInt(r.pos)));
  const allLaps = finishers.flatMap(r => r.lapSecs.filter(v=>v!==null));
  const bestLap = allLaps.length ? Math.min(...allLaps) : null;
  const lapCount = (race.lapLabels||[]).length || (race.riders[0]?.lapTimes?.length||0);

  const lapHeaders = Array.from({length:lapCount},(_,i)=>`<th>${i+1}周</th>`).join('');
  document.querySelector('#result-table thead').innerHTML = `<tr><th>順位</th><th>選手</th><th>合計</th>${lapHeaders}</tr>`;

  const tbody = document.querySelector('#result-table tbody');
  tbody.innerHTML = [...finishers,...dns].map(r => {
    const isDNS = isNaN(parseInt(r.pos));
    const posClass = r.pos==='1'?'pos-1':r.pos==='2'?'pos-2':r.pos==='3'?'pos-3':'';
    const idx = finishers.indexOf(r);
    const color = isDNS ? '#444' : COLORS[idx%COLORS.length];
    const totalSec = r.cumSecs.filter(v=>v!==null).at(-1) ?? null;
    const lapCells = Array.from({length:lapCount},(_,j)=>{
      const lt = r.lapSecs[j];
      return `<td class="${lt===bestLap&&lt!==null?'best-lap':''}">${lt!==null&&lt!==undefined?formatSec(lt):'—'}</td>`;
    }).join('');
    return `<tr class="${isDNS?'dns-row':''}">
      <td class="${posClass}" style="font-weight:500">${r.pos}</td>
      <td class="rider-name"><span class="color-swatch" style="background:${color}"></span>${r.name}</td>
      <td>${formatSec(totalSec)}</td>${lapCells}
    </tr>`;
  }).join('');
}

// ---- Tab ----
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    if (currentRace) renderChart();
  });
});

// ---- Search ----
document.getElementById('race-search').addEventListener('input', renderRaceList);

// ---- Init ----
loadRaces();
</script>
